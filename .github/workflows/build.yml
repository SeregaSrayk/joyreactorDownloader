name: Build

on:
  push:
    branches: [master, main]
    # Tags like v1.0.0 trigger the same build + a release job that attaches
    # the three platform artifacts to a new GitHub Release (draft).
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# Cancel any in-flight build for the same ref when a new commit comes in,
# so we don't burn three runners per push when force-pushing edits.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ubuntu-22.04 has libwebkit2gtk-4.0-dev which Wails v2 links against.
          # ubuntu-24.04 only ships 4.1 and would need -tags webkit2_41 — pinned
          # to 22.04 instead to keep the build flags identical across OSes.
          - os: ubuntu-22.04
            label: linux
            artifact: joyreactorDownloader-linux
            artifact-path: cmd/joyreactor-gui/build/bin/joyreactorDownloader
            build-flags: "-clean"
          # Windows runner builds BOTH the raw exe and a NSIS installer in one
          # pass. `-nsis -webview2 embed` bakes the WebView2 bootstrapper into
          # the installer for users whose Win10 didn't get WebView2 via
          # Windows Update (rare but not zero). artifact-path is a glob so
          # both .exe files end up at the artifact root.
          - os: windows-latest
            label: windows
            artifact: joyreactorDownloader-windows
            artifact-path: cmd/joyreactor-gui/build/bin/*.exe
            build-flags: "-clean -nsis -webview2 embed"
          - os: macos-latest
            label: macos
            artifact: joyreactorDownloader-macos
            artifact-path: cmd/joyreactor-gui/build/bin/joyreactorDownloader.app
            build-flags: "-clean"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          # Caches both ~/go/pkg/mod and the build cache; saves ~60s on warm runs.
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cmd/joyreactor-gui/frontend/package-lock.json

      - name: Install Linux WebView / GTK dev libs
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      # Pin the Wails CLI version to match what go.mod uses, so the bindings
      # generator output stays identical across runs and platforms.
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      # wails.json + main.go live in cmd/joyreactor-gui/ per the project
      # layout. Wails CLI uses the cwd to find its anchor. Build flags
      # per platform come from the matrix (Windows builds the NSIS
      # installer with embedded WebView2 bootstrapper in addition to the
      # raw .exe).
      - name: Build
        working-directory: cmd/joyreactor-gui
        run: wails build ${{ matrix.build-flags }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14

  # Runs only on tag pushes (v1.0.0, v2.3.4-beta, …). Downloads the three
  # platform artifacts produced above, zips each with the tag name baked
  # into the filename, and attaches them to a draft GitHub Release. We
  # leave the release in draft so you can edit the notes / hit publish
  # manually rather than auto-shipping every tag.
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write    # required to create releases & upload assets
    steps:
      # Checkout is required so the next "Read release-notes file" step can
      # see docs/releases/<tag>.md. Without this, the release job has no
      # working copy of the repo — only the artifacts from build/.
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Package per-platform release assets with the version in the name.
      # Format choice per platform:
      #   Windows: raw .exe (portable) + setup.exe (NSIS installer with
      #            embedded WebView2 bootstrapper — for users whose Win10
      #            doesn't already have it)
      #   macOS:   .zip (required, .app is a directory bundle)
      #   Linux:   .tar.gz (preserves executable bit, which zip can strip)
      - name: Package release assets
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          # Windows raw exe — portable, no install. Wails defaults the
          # binary name to joyreactorDownloader.exe.
          win="artifacts/joyreactorDownloader-windows/joyreactorDownloader.exe"
          if [[ -f "$win" ]]; then
            cp "$win" "dist/joyreactorDownloader-${VERSION}.exe"
          fi

          # Windows NSIS installer — Wails names it
          # joyreactorDownloader-amd64-installer.exe by default; rename
          # with version suffix and "setup" so users see two clearly-
          # different files on the Releases page.
          setup="artifacts/joyreactorDownloader-windows/joyreactorDownloader-amd64-installer.exe"
          if [[ -f "$setup" ]]; then
            cp "$setup" "dist/joyreactorDownloader-${VERSION}-setup.exe"
          fi

          # macOS: zip the .app bundle (it's a directory).
          mac_src="artifacts/joyreactorDownloader-macos"
          if [[ -d "$mac_src" ]]; then
            (cd "$mac_src" && zip -qr "../../dist/joyreactorDownloader-${VERSION}-macos.zip" .)
          fi

          # Linux: tar.gz with the binary inside, preserving +x perms.
          lin="artifacts/joyreactorDownloader-linux/joyreactorDownloader"
          if [[ -f "$lin" ]]; then
            chmod +x "$lin"   # belt-and-suspenders: GHA-uploaded artifact may have lost it
            tar -czf "dist/joyreactorDownloader-${VERSION}-linux.tar.gz" \
              -C "artifacts/joyreactorDownloader-linux" joyreactorDownloader
          fi

          ls -la dist/

      # Per-version release notes live in docs/releases/<tag>.md. We read
      # the file contents into a step output and pass it as `body` rather
      # than `body_path` — softprops's body_path resolution was unreliable
      # when combined with generate_release_notes (silently produced an
      # empty release body). Direct `body` works.
      - name: Read release-notes file for this tag
        id: notes
        shell: bash
        run: |
          f="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$f" ]; then
            echo "Using $f as release body ($(wc -c <"$f") bytes)"
            {
              echo 'body<<__JRD_BODY_EOF__'
              cat "$f"
              echo '__JRD_BODY_EOF__'
            } >> "$GITHUB_OUTPUT"
          else
            echo "No $f — falling back to pure auto-generated release notes"
          fi

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Match raw .exe, .zip (macOS), .tar.gz (Linux) — glob covers all.
          files: |
            dist/*.exe
            dist/*.zip
            dist/*.tar.gz
          body: ${{ steps.notes.outputs.body }}
          # When body is set, this appends the auto-generated commit summary
          # below it. When body is empty, generates the body from scratch.
          generate_release_notes: true
          # Draft so you can review/edit before going public. Flip to false
          # if you want every tag-push to auto-publish.
          draft: true
          # Marks pre-releases automatically (v1.0.0-rc.1, v2.0.0-beta etc.).
          prerelease: ${{ contains(github.ref_name, '-') }}
